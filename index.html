<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mattís Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Missie 2</p>
        <h1>Ontsnap uit het lava-doolhof</h1>
      </div>
      <button class="small-reset" onclick="resetGame()">🔄</button>
    </header>

    <section class="message hidden" id="successMessage">
      <div class="message-card success">
        <div class="party">🎉</div>
        <h2>Gelukt!</h2>
        <p>De kat heeft de appel gevonden.</p>
      </div>
    </section>

    <section class="message hidden" id="dangerMessage">
      <div class="message-card danger">
        <div class="party">🔥</div>
        <h2>Oeps!</h2>
        <p>De kat kwam bij de lava. Probeer opnieuw.</p>
      </div>
    </section>

    <section class="playground">
      <div class="grid" id="grid">
        <div id="cat" class="character">🐱</div>
        <div id="apple" class="apple">🍎</div>
        <div id="speechBubble" class="speech-bubble hidden">Miauw!</div>
      </div>
    </section>

    <section class="program">
      <div id="steps" class="steps">
        <span class="empty-state">Kies je plaatjes.</span>
      </div>
    </section>

    <section class="blocks">
      <button onclick="addStep('up')">⬆️</button>
      <button onclick="addStep('down')">⬇️</button>
      <button onclick="addStep('left')">⬅️</button>
      <button onclick="addStep('right')">➡️</button>
      <button onclick="addStep('meow')" class="fun">🔊</button>
      <button onclick="playProgram()" class="play">▶️</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
