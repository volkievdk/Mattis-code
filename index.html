<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mattís Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>

    <header class="topbar">
      <div>
        <p class="eyebrow" id="worldLabel">Wereld 1</p>
        <h1 id="missionTitle">Breng de kat naar de vis</h1>
      </div>
      <button class="icon-button" onclick="resetGame()" aria-label="Opnieuw">↻</button>
    </header>

    <section class="world-picker">
      <button onclick="loadWorld(0)" id="worldButton0">
        <strong>1</strong>
        <span>Bewegen</span>
      </button>
      <button onclick="loadWorld(1)" id="worldButton1">
        <strong>2</strong>
        <span>Verhaal</span>
      </button>
      <button onclick="loadWorld(2)" id="worldButton2">
        <strong>3</strong>
        <span>Slim</span>
      </button>
    </section>

    <section class="lesson-card">
      <div>
        <span class="lesson-label">Wat leer je?</span>
        <p id="lessonText">Zet stappen achter elkaar.</p>
      </div>
      <strong id="stepCounter">0/8</strong>
    </section>

    <section class="message hidden" id="successMessage">
      <div class="message-card success">
        <div class="party">✨</div>
        <div>
          <h2>Gelukt!</h2>
          <p id="successText">Je programma werkt.</p>
        </div>
        <button class="next-button" onclick="nextWorld()">Verder</button>
      </div>
    </section>

    <section class="message hidden" id="dangerMessage">
      <div class="message-card danger">
        <div class="party" id="dangerIcon">🪨</div>
        <div>
          <h2>Oeps!</h2>
          <p id="dangerText">Probeer opnieuw.</p>
        </div>
      </div>
    </section>

    <section class="playground">
      <div class="grid" id="grid">
        <div id="rock" class="rock hidden">🪨</div>
        <div id="cat" class="character">🐱</div>
        <div id="fish" class="fish">🐟</div>
        <div id="speechBubble" class="speech-bubble hidden">Miauw!</div>
      </div>
    </section>

    <section class="program-panel">
      <div class="program-header">
        <span>Mijn programma</span>
        <button class="mini-button" onclick="clearProgram()">Leeg</button>
      </div>
      <div id="steps" class="steps">
        <span class="empty-state">Kies blokjes.</span>
      </div>
    </section>

    <section class="blocks" id="blocks"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
