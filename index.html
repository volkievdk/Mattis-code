<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mattís Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Missie 1</p>
      <h1>Breng de kat naar de appel 🍎</h1>
      <p>Maak je programma met plaatjes. Druk daarna op speel af.</p>
    </section>

    <section class="message hidden" id="successMessage">
      <div class="message-card">
        <div class="party">🎉</div>
        <h2>Goed gedaan!</h2>
        <p>Je hebt de kat naar de appel geprogrammeerd.</p>
        <button onclick="nextMission()">Volgende missie</button>
      </div>
    </section>

    <section class="playground" id="playground">
      <div class="grid">
        <div id="cat" class="character">🐱</div>
        <div id="apple" class="apple">🍎</div>
        <div id="speechBubble" class="speech-bubble hidden">Miauw!</div>
      </div>
    </section>

    <section class="blocks">
      <button onclick="addStep('up')">⬆️ Omhoog</button>
      <button onclick="addStep('down')">⬇️ Omlaag</button>
      <button onclick="addStep('left')">⬅️ Links</button>
      <button onclick="addStep('right')">➡️ Rechts</button>
      <button onclick="addStep('meow')" class="fun">🔊 Miauw</button>
    </section>

    <section class="program">
      <h2>Jouw programma</h2>
      <div id="steps" class="steps">
        <span class="empty-state">Kies plaatjes om je programma te maken.</span>
      </div>
    </section>

    <section class="actions">
      <button class="play" onclick="playProgram()">▶️ Speel af</button>
      <button class="reset" onclick="resetGame()">🔄 Opnieuw</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
