<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mattís Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="missionLabel">Missie 1</p>
        <h1 id="missionTitle">Breng de kat naar de vis 🐟</h1>
      </div>
      <button class="small-reset" onclick="resetGame()">🔄</button>
    </header>

    <section class="mission-picker">
      <button onclick="loadMission(0)" id="missionButton0">1</button>
      <button onclick="loadMission(1)" id="missionButton1">2</button>
      <button onclick="loadMission(2)" id="missionButton2">3</button>
    </section>

    <section class="message hidden" id="successMessage">
      <div class="message-card success">
        <div class="party">🎉</div>
        <h2>Gelukt!</h2>
        <p id="successText">De kat heeft de vis gevonden.</p>
        <button class="next-button" onclick="nextMission()">Volgende missie</button>
      </div>
    </section>

    <section class="message hidden" id="dangerMessage">
      <div class="message-card danger">
        <div class="party">🪨</div>
        <h2>Oeps!</h2>
        <p id="dangerText">Rotsblok! Probeer opnieuw.</p>
      </div>
    </section>

    <section class="message hidden" id="swampMessage">
      <div class="message-card swamp">
        <div class="party">🫧</div>
        <h2>Moeras!</h2>
        <p>Alles is nu omgedraaid.</p>
      </div>
    </section>

    <section class="playground">
      <div class="grid" id="grid">
        <div id="rock" class="rock hidden">🪨</div>
        <div id="cat" class="character">🐱</div>
        <div id="fish" class="fish">🐟</div>
        <div id="speechBubble" class="speech-bubble hidden">Miauw!</div>
      </div>
    </section>

    <section class="program">
      <div id="steps" class="steps">
        <span class="empty-state">Kies je plaatjes.</span>
      </div>
    </section>

    <section class="blocks">
      <button onclick="addStep('up')">⬆️</button>
      <button onclick="addStep('down')">⬇️</button>
      <button onclick="addStep('left')">⬅️</button>
      <button onclick="addStep('right')">➡️</button>
      <button onclick="addStep('meow')" class="fun">🔊</button>
      <button onclick="playProgram()" class="play">▶️</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
