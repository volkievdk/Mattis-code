<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mattís Code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="worldLabel">Wereld 1</p>
        <h1 id="missionTitle">Breng de kat naar de vis 🐟</h1>
      </div>
      <button class="small-reset" onclick="resetGame()">🔄</button>
    </header>

    <section class="world-picker">
      <button onclick="loadWorld(0)" id="worldButton0">1<br><span>Bewegen</span></button>
      <button onclick="loadWorld(1)" id="worldButton1">2<br><span>Verhaal</span></button>
      <button onclick="loadWorld(2)" id="worldButton2">3<br><span>Slim</span></button>
    </section>

    <section class="lesson-bar">
      <span id="lessonText">Les: zet stappen achter elkaar.</span>
      <strong id="stepCounter">0/8</strong>
    </section>

    <section class="message hidden" id="successMessage">
      <div class="message-card success">
        <div class="party">🎉</div>
        <h2>Gelukt!</h2>
        <p id="successText">De kat heeft de vis gevonden.</p>
        <button class="next-button" onclick="nextWorld()">Volgende wereld</button>
      </div>
    </section>

    <section class="message hidden" id="dangerMessage">
      <div class="message-card danger">
        <div class="party" id="dangerIcon">🪨</div>
        <h2>Oeps!</h2>
        <p id="dangerText">Probeer opnieuw.</p>
      </div>
    </section>

    <section class="message hidden" id="swampMessage">
      <div class="message-card swamp">
        <div class="party">🫧</div>
        <h2>Moeras!</h2>
        <p>De knoppen zijn nu omgedraaid.</p>
      </div>
    </section>

    <section class="playground">
      <div class="grid" id="grid">
        <div id="rock" class="rock hidden">🪨</div>
        <div id="cat" class="character">🐱</div>
        <div id="fish" class="fish">🐟</div>
        <div id="speechBubble" class="speech-bubble hidden">Miauw!</div>
      </div>
    </section>

    <section class="program">
      <div id="steps" class="steps">
        <span class="empty-state">Kies je plaatjes.</span>
      </div>
    </section>

    <section class="blocks" id="blocks"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
